# AlignSQL SFT Training Config
# LLaMA-Factory configuration for Qwen3-8B on Spider dataset

### model
model_name_or_path: /root/autodl-tmp/models/qwen3-8b
trust_remote_code: true
quantization_bit: null

### method
stage: sft
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0
lora_target: all
enable_thinking: false

### dataset
dataset: spider_sft
dataset_dir: data
template: qwen3_nothink
cutoff_len: 1024
max_samples: 100000
val_size: 0.1
eval_strategy: steps
eval_steps: 100
per_device_eval_batch_size: 2
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /root/alignsql/models/sft/qwen3-8b-spider
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
num_train_epochs: 3.0
gradient_checkpointing: true
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1e-4
warmup_steps: 0
lr_scheduler_type: cosine
max_grad_norm: 1.0
bf16: true
flash_attn: auto
optim: adamw_torch
ddp_timeout: 180000000
include_num_input_tokens_seen: true
packing: false

### wandb
report_to: wandb